[main]
font=monospace:size=8
dpi-aware=yes
prompt="> "
match-mode=fuzzy
icon-theme=Papirus
lines=15
width=40
horizontal-pad=20
vertical-pad=10
inner-pad=10
dpi-aware=yes
layer=overlay
exit-on-keyboard-focus-loss=yes


[colors]
background=1f1f1fcc
text=f5f5f5ff
prompt=00ffffff
placeholder=9ca3afff
input=ffffffff
match=22ffffff
selection=B6B8B8dd
selection-text=000000ff
selection-match=e5e5e5ff
border=ffffffff

[border]
width=2
radius=6

[key-bindings]
next=Down
prev=Up
delete-line=Control+w
execute=Return
cancel=Escape

[dmenu]
mode=text
exit-immediately-if-empty=yes
